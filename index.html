<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe — Minimax AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Tic-Tac-Toe</h1>
      <p class="subtitle">
        <span class="x-color">You (X)</span> vs <span class="o-color">AI (O)</span>
      </p>
    </header>

    <div class="scoreboard">
      <div class="score-card">
        <span class="score-label">You</span>
        <span class="score-value" id="score-human">0</span>
      </div>
      <div class="score-card">
        <span class="score-label">Draw</span>
        <span class="score-value" id="score-draw">0</span>
      </div>
      <div class="score-card">
        <span class="score-label">AI</span>
        <span class="score-value" id="score-ai">0</span>
      </div>
    </div>

    <p class="status" id="status">Your turn &mdash; click a cell</p>

    <div class="board" id="board">
      <div class="cell" data-row="0" data-col="0"></div>
      <div class="cell" data-row="0" data-col="1"></div>
      <div class="cell" data-row="0" data-col="2"></div>
      <div class="cell" data-row="1" data-col="0"></div>
      <div class="cell" data-row="1" data-col="1"></div>
      <div class="cell" data-row="1" data-col="2"></div>
      <div class="cell" data-row="2" data-col="0"></div>
      <div class="cell" data-row="2" data-col="1"></div>
      <div class="cell" data-row="2" data-col="2"></div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="btn-restart">New Game</button>
      <button class="btn btn-secondary" id="btn-reset-scores">Reset Scores</button>
    </div>

    <div class="difficulty">
      <label>
        <input type="checkbox" id="ai-first" />
        Let AI go first
      </label>
    </div>

    <footer>
      <p>Unbeatable Minimax AI &mdash; good luck!</p>
    </footer>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
